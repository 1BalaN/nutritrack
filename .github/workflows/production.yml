name: Production Build (EAS)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options: [all, android, ios]

jobs:
  build-production:
    name: EAS Production Build
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_BUILD_AUTOCOMMIT: "1"
      EAS_BUILD_NO_EXPO_GO_WARNING: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Validate EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not set. Add it in: GitHub Repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Build Android (AAB)
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event_name == 'push' }}
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ env.EXPO_TOKEN }}
          EAS_BUILD_AUTOCOMMIT: ${{ env.EAS_BUILD_AUTOCOMMIT }}
          EAS_BUILD_NO_EXPO_GO_WARNING: ${{ env.EAS_BUILD_NO_EXPO_GO_WARNING }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Build iOS (IPA)
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ env.EXPO_TOKEN }}
          EAS_BUILD_AUTOCOMMIT: ${{ env.EAS_BUILD_AUTOCOMMIT }}
          EAS_BUILD_NO_EXPO_GO_WARNING: ${{ env.EAS_BUILD_NO_EXPO_GO_WARNING }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
