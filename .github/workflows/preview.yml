name: Preview Build (EAS)

on:
  push:
    branches: [develop]

jobs:
  build-preview:
    name: EAS Preview Build
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_BUILD_NO_EXPO_GO_WARNING: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Validate EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not set. Add it in: GitHub Repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Build Android preview (APK)
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "Preview Android EAS build attempt $attempt/3"
            if eas build --platform android --profile preview --non-interactive; then
              echo "Preview Android build succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_for=$((attempt * 60))
              echo "Build failed. Retrying in ${sleep_for}s..."
              sleep "$sleep_for"
            fi
          done
          echo "Preview Android build failed after 3 attempts."
          exit 1
        env:
          EXPO_TOKEN: ${{ env.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: ${{ env.EAS_BUILD_NO_EXPO_GO_WARNING }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
